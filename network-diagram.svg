<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="100%">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="900" height="520" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#e2e8f0" letter-spacing="1">Homelab Network Topology</text>

  <!-- Internet / Fiber ONT -->
  <rect x="400" y="55" width="100" height="40" rx="8" fill="#1e293b" stroke="#64748b" stroke-width="2"/>
  <text x="450" y="72" text-anchor="middle" font-family="system-ui" font-size="11" fill="#94a3b8" font-weight="600">Fiber ONT</text>
  <text x="450" y="86" text-anchor="middle" font-family="system-ui" font-size="9" fill="#64748b">Internet</text>

  <!-- Line ONT → Router -->
  <line x1="450" y1="95" x2="450" y2="130" stroke="#64748b" stroke-width="2"/>

  <!-- Router: Archer C7 -->
  <rect x="360" y="130" width="180" height="60" rx="10" fill="#1e293b" stroke="#3b82f6" stroke-width="2" filter="url(#glow)"/>
  <text x="450" y="155" text-anchor="middle" font-family="system-ui" font-size="14" fill="#60a5fa" font-weight="700">TP-Link Archer C7</text>
  <text x="450" y="172" text-anchor="middle" font-family="system-ui" font-size="10" fill="#94a3b8">OpenWrt · VLAN Routing + Firewall</text>
  <text x="450" y="184" text-anchor="middle" font-family="system-ui" font-size="9" fill="#64748b">2.4GHz / 5GHz WiFi</text>

  <!-- Branch lines from router to VLANs -->
  <line x1="450" y1="190" x2="250" y2="240" stroke="#64748b" stroke-width="2"/>
  <line x1="450" y1="190" x2="650" y2="240" stroke="#64748b" stroke-width="2"/>

  <!-- MAIN LAN Section -->
  <rect x="60" y="240" width="380" height="200" rx="12" fill="rgba(34,197,94,0.06)" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="250" y="265" text-anchor="middle" font-family="system-ui" font-size="16" fill="#4ade80" font-weight="700">MAIN LAN</text>
  <text x="250" y="283" text-anchor="middle" font-family="system-ui" font-size="11" fill="#86efac">VLAN 1 · 192.168.0.0/24 · SSID: Citrus</text>

  <!-- Main LAN Devices -->
  <rect x="85" y="300" width="70" height="45" rx="8" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="120" y="318" text-anchor="middle" font-family="system-ui" font-size="11" fill="#bbf7d0" font-weight="600">PC</text>
  <text x="120" y="332" text-anchor="middle" font-family="system-ui" font-size="9" fill="#86efac">Workstation</text>
  <text x="120" y="344" text-anchor="middle" font-family="system-ui" font-size="8" fill="#4ade80">Ethernet</text>

  <rect x="175" y="300" width="70" height="45" rx="8" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="210" y="318" text-anchor="middle" font-family="system-ui" font-size="11" fill="#bbf7d0" font-weight="600">Phone</text>
  <text x="210" y="332" text-anchor="middle" font-family="system-ui" font-size="9" fill="#86efac">Mobile</text>
  <text x="210" y="344" text-anchor="middle" font-family="system-ui" font-size="8" fill="#4ade80">WiFi 5GHz</text>

  <rect x="265" y="300" width="70" height="45" rx="8" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="300" y="318" text-anchor="middle" font-family="system-ui" font-size="11" fill="#bbf7d0" font-weight="600">Proxmox</text>
  <text x="300" y="332" text-anchor="middle" font-family="system-ui" font-size="9" fill="#86efac">Homelab</text>
  <text x="300" y="344" text-anchor="middle" font-family="system-ui" font-size="8" fill="#4ade80">Ethernet</text>

  <rect x="355" y="300" width="70" height="45" rx="8" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="390" y="318" text-anchor="middle" font-family="system-ui" font-size="11" fill="#bbf7d0" font-weight="600">Laptop</text>
  <text x="390" y="332" text-anchor="middle" font-family="system-ui" font-size="9" fill="#86efac">Portable</text>
  <text x="390" y="344" text-anchor="middle" font-family="system-ui" font-size="8" fill="#4ade80">WiFi 5GHz</text>

  <!-- Main LAN extra note -->
  <text x="250" y="375" text-anchor="middle" font-family="system-ui" font-size="9" fill="#4ade80" opacity="0.7">Full internet access · Can reach IoT VLAN</text>

  <!-- IOT VLAN Section -->
  <rect x="460" y="240" width="380" height="200" rx="12" fill="rgba(249,115,22,0.06)" stroke="#f97316" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="650" y="265" text-anchor="middle" font-family="system-ui" font-size="16" fill="#fb923c" font-weight="700">IOT VLAN</text>
  <text x="650" y="283" text-anchor="middle" font-family="system-ui" font-size="11" fill="#fdba74">VLAN 20 · 192.168.1.0/24 · SSID: IoT · 2.4GHz Only</text>

  <!-- IoT Devices -->
  <rect x="485" y="300" width="70" height="45" rx="8" fill="#7c2d12" stroke="#f97316" stroke-width="1.5"/>
  <text x="520" y="318" text-anchor="middle" font-family="system-ui" font-size="11" fill="#fed7aa" font-weight="600">Bulb</text>
  <text x="520" y="332" text-anchor="middle" font-family="system-ui" font-size="9" fill="#fdba74">Smart Light</text>
  <text x="520" y="344" text-anchor="middle" font-family="system-ui" font-size="8" fill="#fb923c">WiFi 2.4GHz</text>

  <rect x="575" y="300" width="70" height="45" rx="8" fill="#7c2d12" stroke="#f97316" stroke-width="1.5"/>
  <text x="610" y="318" text-anchor="middle" font-family="system-ui" font-size="11" fill="#fed7aa" font-weight="600">Doorbell</text>
  <text x="610" y="332" text-anchor="middle" font-family="system-ui" font-size="9" fill="#fdba74">Smart</text>
  <text x="610" y="344" text-anchor="middle" font-family="system-ui" font-size="8" fill="#fb923c">WiFi 2.4GHz</text>

  <rect x="665" y="300" width="70" height="45" rx="8" fill="#7c2d12" stroke="#f97316" stroke-width="1.5"/>
  <text x="700" y="318" text-anchor="middle" font-family="system-ui" font-size="11" fill="#fed7aa" font-weight="600">Assistant</text>
  <text x="700" y="332" text-anchor="middle" font-family="system-ui" font-size="9" fill="#fdba74">Voice</text>
  <text x="700" y="344" text-anchor="middle" font-family="system-ui" font-size="8" fill="#fb923c">WiFi 2.4GHz</text>

  <rect x="755" y="300" width="70" height="45" rx="8" fill="#7c2d12" stroke="#f97316" stroke-width="1.5"/>
  <text x="790" y="318" text-anchor="middle" font-family="system-ui" font-size="11" fill="#fed7aa" font-weight="600">TV</text>
  <text x="790" y="332" text-anchor="middle" font-family="system-ui" font-size="9" fill="#fdba74">Smart TV</text>
  <text x="790" y="344" text-anchor="middle" font-family="system-ui" font-size="8" fill="#fb923c">WiFi 2.4GHz</text>

  <!-- IP Camera (separate, wired) -->
  <rect x="575" y="365" width="70" height="45" rx="8" fill="#7c2d12" stroke="#f97316" stroke-width="1.5"/>
  <text x="610" y="383" text-anchor="middle" font-family="system-ui" font-size="11" fill="#fed7aa" font-weight="600">IP Camera</text>
  <text x="610" y="397" text-anchor="middle" font-family="system-ui" font-size="9" fill="#fdba74">Security</text>
  <text x="610" y="409" text-anchor="middle" font-family="system-ui" font-size="8" fill="#fb923c">Ethernet</text>

  <!-- IoT extra note -->
  <text x="650" y="375" text-anchor="middle" font-family="system-ui" font-size="9" fill="#fb923c" opacity="0.7">Internet access · LAN access blocked</text>

  <!-- Firewall Rules Banner -->
  <rect x="200" y="460" width="500" height="42" rx="8" fill="rgba(239,68,68,0.08)" stroke="#ef4444" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="450" y="478" text-anchor="middle" font-family="system-ui" font-size="11" fill="#fca5a5" font-weight="600">OpenWrt Firewall Rules</text>
  <text x="450" y="494" text-anchor="middle" font-family="system-ui" font-size="10" fill="#f87171">IoT VLAN → Main LAN: DROP  |  Main LAN → IoT VLAN: ACCEPT  |  Both → WAN: ACCEPT</text>

  <!-- Legend -->
  <rect x="20" y="20" width="130" height="90" rx="8" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="30" y="38" font-family="system-ui" font-size="11" fill="#cbd5e1" font-weight="600">Legend</text>
  <line x1="30" y1="44" x2="140" y2="44" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <rect x="30" y="52" width="14" height="10" rx="3" fill="#22c55e"/>
  <text x="50" y="61" font-family="system-ui" font-size="9" fill="#94a3b8">Trusted LAN</text>
  <rect x="30" y="70" width="14" height="10" rx="3" fill="#f97316"/>
  <text x="50" y="79" font-family="system-ui" font-size="9" fill="#94a3b8">Untrusted IoT</text>
  <line x1="30" y1="88" x2="44" y2="88" stroke="#64748b" stroke-width="2"/>
  <text x="50" y="92" font-family="system-ui" font-size="9" fill="#94a3b8">Connection</text>
</svg>